<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title description">
<title id="title">TelSeq Parallel wall time versus requested threads</title>
<desc id="description">Wall time falls from 55.14 minutes with 1 requested thread to 5.60 minutes at 80 threads. The final measurement at 80 threads is 5.60 minutes.</desc>
